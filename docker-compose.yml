services:
  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api-service:
    build: ./api-service
    ports:
      - "8080:8080"

  notification-service:
    build: ./notification-service
    ports:
      - "8081:8081"
    depends_on:
      - api-service
    environment:
      API_BASE_URL: http://api-service:8080

  scraper-service:
    build: ./scraper-service
    depends_on:
      - redis
      - api-service
      - notification-service
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_BASE_URL: http://api-service:8080
      NOTIFICATION_SERVICE_URL: http://notification-service:8081
      POLL_INTERVAL_SECONDS: 60

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - api-service
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8080
